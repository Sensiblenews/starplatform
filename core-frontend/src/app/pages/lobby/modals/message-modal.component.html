<ion-header>
    <ion-toolbar color="light">
    <ion-title>Support & Payout</ion-title>
    <ion-buttons slot="end">
        <ion-button (click)="dismiss()">Close</ion-button>
    </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content #content class="ion-padding">
    <div class="message-list">
    <div *ngFor="let msg of messages" [ngClass]="msg.SENDER_TYPE === 'USER' ? 'my-msg' : 'admin-msg'">
        <div class="bubble">{{ msg.MESSAGE }}</div>
        <div class="time">{{ msg.CREATED_AT | date:'MM.dd HH:mm' }}</div>
    </div>
    </div>
</ion-content>

<ion-footer class="ion-no-border">
    <ion-toolbar>
    <ion-input [(ngModel)]="newMessage" placeholder="Type a message..."></ion-input>
    <ion-button slot="end" fill="clear" (click)="send()">Send</ion-button>
    </ion-toolbar>
</ion-footer>
