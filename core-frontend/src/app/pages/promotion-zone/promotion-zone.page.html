<ion-header [translucent]="true">
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-button (click)="moveBack()">
        <ion-icon name="chevron-back"></ion-icon>
        <ion-label>Back</ion-label>
      </ion-button>
    </ion-buttons>
    <ion-title>홍보 존</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullScreen class="promo-container">
  <header class="list-header">
    <div class="list-banner" (click)="sendContent()">
      홍보문의 가능합니다!
    </div>
    <div class="list-title">홍보 존</div>
  </header>
  <app-content-list
    [viewType]="viewType"
    [contentSubscriber]="getContentSubscriber()"
  ></app-content-list>
</ion-content>
