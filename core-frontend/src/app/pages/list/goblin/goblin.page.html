<app-header pageTitle="도깨비"></app-header>
<ion-content fullscreen>
  <app-content-list
    viewType="goblin"
    [contentType]="contentType"
    [contentSubscriber]="getContentSubscriber()"
  ></app-content-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" *ngIf="isAuthed">
    <ion-fab-button size="small" color="danger" (click)="doWrite()">
      <ion-icon name="pencil-sharp"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
